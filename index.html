<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <main class="p-3">
        <div class="d-flex align-items-center justify-content-center mt-5">
            <div class="card shadow">
                <div class="card-bodys">

                    <div class="text-center p-3">
                        <h2>Cadastro de Aluno</h2>
                        <p>Preencha os dados abaixo para realizar o registro completo do aluno no sistema acadêmico.</p>
                    </div>

                    <form id="form-cadastro" class="row g-3 p-3">
                        <div class="row p-2 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Nome completo</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">CPF</label>
                                <input type="text" class="form-control">
                            </div>
                        </div>

                        <div class="row p-2 mb-3">
                            <div class="col-5 col-md-4">
                                <label class="form-label">Data de Nascimento</label>
                                <input type="date" class="form-control">
                            </div>

                            <div class=" col-md-4">
                                <label class="form-label">Telefone</label>
                                <input type="tel" class="form-control">
                            </div>

                            <div class=" col-md-4">
                                <label class="form-label">E-mail</label>
                                <input type="email" class="form-control">
                            </div>
                        </div>

                        <div class="p-2 mb-3">
                            <label class="form-label">Endereço Completo</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="row p-2  mb-3">
                            <div class=" col-md-4">
                                <label class="form-label">Cidade</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class=" col-md-4">
                                <label class="form-label">Estado</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class=" col-md-4">
                                <label class="form-label">CEP</label>
                                <input type="text" class="form-control">
                            </div>
                        </div>

                        <div class="row p-2  mb-3">
                            <div class=" col-md-6">
                                <label class="form-label">Curso</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class=" col-md-6">
                                <label class="form-label">Matrícula</label>
                                <input type="text" class="form-control">
                            </div>
                        </div>

                        <div class="row p-2 mb-3">
                            <div class=" col-md-6">
                                <label class="form-label">Senha</label>
                                <input type="password" class="form-control">
                            </div>

                            <div class=" col-md-6">
                                <label class="form-label">Confirmar Senha</label>
                                <input type="password" class="form-control">
                            </div>
                        </div>

                        <button class="btn btn-primary mt-3 w-100" type="submit">Cadastrar Aluno</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="script.js"></script>
</body>

</html>
